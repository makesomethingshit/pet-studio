name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Windows tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pillow

      - name: Widget tests
        run: python -m unittest discover -s pet-studio-widget\tests

      - name: Kit tests
        run: python -m unittest discover -s pet-studio-kit\tests

      - name: Compile key Python files
        run: >
          python -m py_compile
          pet-studio-widget\pet_studio_event_adapter.py
          pet-studio-widget\set_pet_studio_state.py
          pet-studio-widget\set_active_pet_studio.py
          pet-studio-widget\pet_studio_widget.py
          pet-studio-widget\project_room_registry.py
          pet-studio-kit\scripts\create_project_room_kit.py
          tools\pet_studio_preflight.py
          tools\pet_studio_create_room.py
          tools\pet_studio_create_qa_pack.py
